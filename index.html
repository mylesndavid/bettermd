<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BetterMD</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Drag region for native title bar -->
  <div id="titlebar">
    <button id="back-btn" class="hidden" title="Back to recents">
      <span>‹</span>
      <span>Back</span>
    </button>
    <div id="title-text"></div>
    <div id="toolbar">
      <button id="edit-btn" title="Edit (⌘E)">
        <span id="edit-icon">✎</span>
        <span id="edit-label">Edit</span>
      </button>
      <button id="toggle-btn" title="Toggle Raw / Rendered (⌘⇧R)">
        <span id="toggle-icon">◉</span>
        <span id="toggle-label">Rendered</span>
      </button>
      <div id="more-menu-wrapper">
        <button id="more-btn" title="More actions">
          <span>···</span>
        </button>
        <div id="more-menu" class="hidden">
          <button id="pdf-btn">
            <span>⬡</span>
            <span>Save as PDF</span>
            <span class="shortcut-hint">⌘⇧E</span>
          </button>
          <button id="finder-btn">
            <span>⌕</span>
            <span>Show in Finder</span>
          </button>
          <button id="share-btn">
            <span>↗</span>
            <span>Share…</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div id="empty-state">
    <div class="empty-icon">◇</div>
    <h2>BetterMD</h2>
    <p>Open a Markdown file to get started</p>
    <p class="shortcut">⌘O to open&ensp;·&ensp;or drag a file here</p>
    <div id="recents" class="hidden">
      <h3>Recents</h3>
      <ul id="recents-list"></ul>
    </div>
  </div>

  <!-- Content views -->
  <div id="content" class="hidden">
    <div id="rendered-view" class="view active"></div>
    <div id="raw-view" class="view">
      <pre><code id="raw-code"></code></pre>
    </div>
    <div id="edit-view" class="view">
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
  </div>

  <script src="renderer.bundle.js"></script>
</body>
</html>
